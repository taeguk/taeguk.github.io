<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
	<head>
		<title>Taeguk Kwon</title>
		<meta http-equiv="Content-Type" content="text/html" charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">
		<link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
		
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
		<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
		
		<style>		
			/*
				@screen-xs-max: 767px;
				@screen-sm-min: 768px;
				@screen-sm-max: 991px;
				@screen-md-min: 992px;
				@screen-md-max: 1199px;
				@screen-lg-min: 1200px;
			*/
			
			@import url(https://fonts.googleapis.com/earlyaccess/nanumgothic.css);
			@import url(https://fonts.googleapis.com/earlyaccess/jejugothic.css);

			* {
				/* font-family: 'Nanum Gothic', serif; */
				font-family: 'Jeju Gothic', serif;
			}

			html, body {
				height:100%;
			}
			
			a , a:hover {
				text-decoration: none;
			}
			
			.myrow {
				margin: 0;
				padding: 0;
			}
			
			.elem-box {
				height: 50%;
				margin: 0;
				padding: 0;
				text-align: center;
				color: white;
				font-size: 50px;
			}
			
			.elem-box a {
				color: white;
			}
			
			.elem-box:hover {
				opacity: 0.6;
			}
			
			.mytext-wrap {
				display: table;
				width: 100%;
				height: 100%;
			}
			
			.mytext {
				display: table-cell;
				vertical-align: middle;
			}
			
			.centered {
				position: fixed;
				top: 50%;
				left: 50%;
				/* bring your own prefixes */
				transform: translate(-50%, -50%);
			}
			
			figure {
				overflow: hidden;
			}

			/* Zoom In #1 */
			.hover01 figure img {
				-webkit-transform: scale(1);
				transform: scale(1);
				-webkit-transition: .3s ease-in-out;
				transition: .3s ease-in-out;
			}
			.hover01 figure:hover img {
				-webkit-transform: scale(1.2);
				transform: scale(1.2);
			}

			/* Gray Scale */
			.hover08 figure img {
				-webkit-filter: grayscale(100%);
				filter: grayscale(100%);
				-webkit-transition: .3s ease-in-out;
				transition: .3s ease-in-out;
			}
			.hover08 figure:hover img {
				-webkit-filter: grayscale(0);
				filter: grayscale(0);
			}

			/* Shine */
			.hover14 figure {
				position: relative;
			}
			.hover14 figure::before {
				position: absolute;
				top: 0;
				left: -75%;
				z-index: 2;
				display: block;
				content: '';
				width: 50%;
				height: 100%;
				background: -webkit-linear-gradient(left, rgba(255,255,255,0) 0%, rgba(255,255,255,.3) 100%);
				background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,.3) 100%);
				-webkit-transform: skewX(-25deg);
				transform: skewX(-25deg);
			}
			.hover14 figure:hover::before {
				-webkit-animation: shine .75s;
				animation: shine .75s;
				animation-delay: .35s;
			}
			@-webkit-keyframes shine {
				100% {
					left: 125%;
				}
			}
			@keyframes shine {
				100% {
					left: 125%;
				}
			}
			
			#profile {
				transition: border-radius .5s ease;
				background-color: white;
				background-size: contain;
				z-index: 1000;
				border: 0;
				border-radius: 2rem;
			}

			#profile:hover {
				border: 0;
				border-radius: 2rem;
				border-top-right-radius: 0;
				border-bottom-right-radius: 0;
			}

			#profile img {
				border: 0;
				border-radius: 2rem;
				border-top-right-radius: 0;
				border-bottom-right-radius: 0;
			}

			#linkedin {
				background-color: #0077B5;
			}
			#github {
				background-color: #24292E;
			}
			#blog {
				background-color: #FF9224;
			}
			#facebook {
				background-color: #4267B2;
			}
		</style>
	</head>
	<body>
		<div id='profile' class="card mx-auto centered">
		  <div class="row no-gutters">
			<div class="col-md-5 hover01 hover08 hover14">
				<a target="_blank" href="https://ask.fm/xornrbboy">
					<figure><img src="https://avatars2.githubusercontent.com/u/9107889" class="card-img" alt="Profile Image"/></figure>
				</a>
			</div>
			<div class="col-md-7">
			  <div class="card-body">
				<h1 class="card-title">Taeguk Kwon</h1>
				<p class="card-text">안녕하세요 :)</br> 산업기능요원 현역 복무중입니다^^</br> <span id='d-day'></span></p>
				<p class="card-text"><small class="text-muted"><a href="mailto:xornrbboy@gmail.com">xornrbboy@gmail.com</a></small></p>
			  </div>
			</div>
		  </div>
		</div>
		<div style="width:100%; height:100%">
			<div class='row myrow'>
				<div id="linkedin" class="col-12 col-sm-12 col-md-6 elem-box">
					<a href='https://www.linkedin.com/in/taeguk'>
						<span class="mytext-wrap"><span class="mytext">LinkedIn</span></span>
					</a>
				</div>
				<div id="github" class="col-12 col-sm-12 col-md-6 elem-box">
					<a href='https://github.com/taeguk'>
						<span class="mytext-wrap"><span class="mytext">Github</span></span>
					</a>
				</div>
				<div id="blog" class="col-12 col-sm-12 col-md-6 elem-box">
					<a href='https://taeguk2.blogspot.com'>
						<span class="mytext-wrap"><span class="mytext">Blog</span></span>
					</a>
				</div>
				<div id="facebook" class="col-12 col-sm-12 col-md-6 elem-box">
					<a href='https://www.facebook.com/xornrbboy'>
						<span class="mytext-wrap"><span class="mytext">Facebook</span></span>
					</a>
				</div>
			</div>
		</div>
		<script type="text/javascript">
			function set_elem_box_height() {
				var window_width = $(window).width();
				var window_height = $(window).height();
				
				var elem_height;
				if (window_width < 768) elem_height = window_height / 4;
				else 				 elem_height = window_height / 2; 
				
				$('.elem-box').height(elem_height);
			}
			function modify_profile() {
				var window_width = $(window).width();
				
				var profile_width;
				var root_font_size;
				
				if(window_width <= 767) {
					// hide profile
					$('#profile').hide();
					return;
				}
				else if(768 <= window_width && window_width <= 991) {
					profile_width = 460;
					root_font_size = '14px';
				}
				else if(992 <= window_width && window_width <= 1199) {
					profile_width = 530;
					root_font_size = '16px';
				}
				else {
					profile_width = 600;
					root_font_size = '18px';
				}
				
				$('html').css('font-size', root_font_size);
				$('#profile').width(profile_width);
				$('#profile').height(profile_width * 5 / 12);
				$('#profile').show();
			}
			
			$(document).ready(function() {
				set_elem_box_height();
				modify_profile();
			});
			$(window).resize(function() {
				set_elem_box_height();
				modify_profile();
			});

			var d_day = new Date("Sep 19, 2020 17:00:00").getTime();

			//1초마다 갱신되도록 함수 생성,실행
			var x = setInterval(function() {
				var now = new Date().getTime();
				var distance = d_day - now;

				var d = Math.floor(distance / (1000 * 60 * 60 * 24));
				var h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
				var m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
				var s = Math.floor((distance % (1000 * 60)) / 1000);

				$("#d-day").text(d + "일 " + h + "시간 " + m + "분 " + s + "초 남았습니다.");
			});
		</script>
	</body>
</html>
